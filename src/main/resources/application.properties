spring.application.name=digital_donation_api

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/digital_donation_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/{registrationId}

# OAuth2 Frontend Redirect URL
oauth2.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:todayinternet168@gmail.com}
spring.mail.password=${MAIL_PASSWORD:wirp hfug rjaw khwv}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from.address=${MAIL_FROM_ADDRESS:support@today.com.kh}
mail.from.name=${MAIL_FROM_NAME:Today Communication}

# OTP Configuration
otp.expiration-minutes=5
otp.max-attempts=3

# Security Configuration
security.max-login-attempts=5
security.lock-duration-minutes=30

# Server Configuration
server.port=8080

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging.level.com.example.digital_donation_api=INFO
logging.level.org.springframework.security=WARN

# File upload limits (match frontend multi-image)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=200MB

# Compression Configuration
server.compression.enabled=true
server.compression.mime-types=application/json,text/css,text/html,application/javascript
server.compression.min-response-size=1024

# Bakong Production or Sandbox API Base URL
bakong.api.base-url=https://api-bakong.nbc.gov.kh/v1

